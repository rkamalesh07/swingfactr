name: Daily ETL + Props Board

on:
  schedule:
    # Game data ETL — 9am EST (14:00 UTC) daily
    - cron: '0 14 * * *'
    # Props board — 3x daily on game days only (script skips if no games)
    # 6:30am PST = 14:30 UTC
    # 12pm PST   = 20:00 UTC
    # 3:30pm PST = 23:30 UTC
    - cron: '30 14 * * *'
    - cron: '0 20 * * *'
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - etl
          - props

jobs:
  incremental-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 14 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run incremental ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m src.etl.incremental --season 2025-26

  props-board:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 14 * * *' ||
      github.event.schedule == '0 20 * * *' ||
      github.event.schedule == '30 23 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run props board ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -m src.etl.props_board
